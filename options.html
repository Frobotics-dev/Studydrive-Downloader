<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studydrive Downloader</title>
  <style>
    :root {
      --bg: #0f1114;
      --surface: #181c21;
      --surface-hover: #1e242b;
      --text: #e6e9ec;
      --text-muted: #8b929a;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
      --radius: 12px;
      --radius-sm: 8px;
      --popup-radius: 16px;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      border-radius: var(--popup-radius);
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      width: 380px;
      min-height: 320px;
      background: var(--bg);
      color: var(--text);
      border-radius: var(--popup-radius);
    }
    .container {
      padding: 24px;
      border-radius: var(--popup-radius);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--surface-hover);
    }
    .header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .header .icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), #6366f1);
      flex-shrink: 0;
    }
    .progress-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface-hover);
    }
    .progress-bar .segment {
      flex: 1;
      background: var(--surface-hover);
      transition: background 0.2s;
    }
    .progress-bar .segment.done {
      background: var(--success);
    }
    .progress-bar .segment.current {
      background: var(--accent);
    }
    .checklist {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .checklist li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      margin-bottom: 4px;
      background: var(--surface);
    }
    .checklist li.done {
      color: var(--text-muted);
    }
    .checklist .check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: white;
    }
    .checklist li.done .check {
      background: var(--success);
      border-color: var(--success);
    }
    .checklist li .confirm-btn {
      margin-left: auto;
      padding: 6px 12px;
      font-size: 0.75rem;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }
    .checklist li .confirm-btn:hover {
      background: var(--accent-hover);
    }
    .section {
      margin-top: 16px;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 0 0 10px 0;
    }
    button.primary {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: background 0.15s, transform 0.1s;
    }
    button.primary:hover {
      background: var(--accent-hover);
    }
    button.primary:active {
      transform: scale(0.98);
    }
    #cleanupFolderBtn {
      margin-top: 8px;
      background: var(--surface-hover);
      color: var(--text);
    }
    #cleanupFolderBtn:hover {
      background: #252b33;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      line-height: 1.4;
      display: none;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      display: block;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon"></div>
      <h1>Studydrive Downloader</h1>
    </div>

    <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="5">
      <div class="segment" data-step="1"></div>
      <div class="segment" data-step="2"></div>
      <div class="segment" data-step="3"></div>
      <div class="segment" data-step="4"></div>
      <div class="segment" data-step="5"></div>
    </div>

    <ul class="checklist" id="checklist">
      <li id="item-download">
        <span class="check"></span>
        <span>Download</span>
      </li>
      <li id="item-filtering">
        <span class="check"></span>
        <span>Filtering (remove duplicate files)</span>
        <button type="button" class="confirm-btn" id="confirmFilteringBtn" style="display: none;">Confirm</button>
      </li>
      <li id="item-sort">
        <span class="check"></span>
        <span>Sorting</span>
      </li>
      <li id="item-rename">
        <span class="check"></span>
        <span>Rename</span>
      </li>
      <li id="item-folder">
        <span class="check"></span>
        <span>Open folder</span>
      </li>
    </ul>

    <div class="section">
      <p class="section-title">Start</p>
      <button type="button" class="primary" id="startAutoScrollBtn">Start auto-scroll</button>
      <button type="button" id="cleanupFolderBtn" style="display: block; width: 100%; padding: 12px 16px; border: none; border-radius: var(--radius-sm); font-size: 0.9375rem; margin-top: 8px; cursor: pointer;">Select folder and rename</button>
    </div>

    <div id="status" class="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
